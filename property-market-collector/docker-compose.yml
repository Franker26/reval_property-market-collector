services:
  property-market-collector:
    build: .
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      - SERVICE_TOKEN=${SERVICE_TOKEN:-}
      - DATABASE_URL=postgresql+asyncpg://reval:reval@postgres:5432/reval_mi
      - SYNC_DATABASE_URL=postgresql://reval:reval@postgres:5432/reval_mi
      - COLLECTOR_TIMEZONE=${COLLECTOR_TIMEZONE:-America/Argentina/Buenos_Aires}
      - ZONAPROP_BASE_URL=${ZONAPROP_BASE_URL:-https://www.zonaprop.com.ar}
      - ZONAPROP_API_POSTINGS_URL=${ZONAPROP_API_POSTINGS_URL:-https://www.zonaprop.com.ar/rplis-api/postings}
      - ZONAPROP_ENABLE_SESSION_WARMUP=${ZONAPROP_ENABLE_SESSION_WARMUP:-true}
      - ZONAPROP_WARMUP_URL=${ZONAPROP_WARMUP_URL:-https://www.zonaprop.com.ar/inmuebles-venta.html}
      - ZONAPROP_USER_AGENT=${ZONAPROP_USER_AGENT:-}
      - WRITE_DATABASE=${WRITE_DATABASE:-true}
      - ZONAPROP_URL_DISCOVERY_MIN_DELAY=${ZONAPROP_URL_DISCOVERY_MIN_DELAY:-1.5}
      - ZONAPROP_URL_DISCOVERY_MAX_DELAY=${ZONAPROP_URL_DISCOVERY_MAX_DELAY:-4}
      - ZONAPROP_URL_DISCOVERY_BURST_LIMIT=${ZONAPROP_URL_DISCOVERY_BURST_LIMIT:-20}
      - APP_ENV=${APP_ENV:-production}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - ALERT_ERROR_RATE_THRESHOLD=${ALERT_ERROR_RATE_THRESHOLD:-10}
      - ALERT_CONSECUTIVE_4XX_THRESHOLD=${ALERT_CONSECUTIVE_4XX_THRESHOLD:-3}
      - REVAL_MI_API_KEY=${REVAL_MI_API_KEY:-}
      - REFRESH_MONITOR_ENABLED=${REFRESH_MONITOR_ENABLED:-true}
      - REFRESH_GAP_HOURS_HOT=${REFRESH_GAP_HOURS_HOT:-24}
      - REFRESH_GAP_HOURS_WARM=${REFRESH_GAP_HOURS_WARM:-96}
      - REFRESH_GAP_HOURS_COLD=${REFRESH_GAP_HOURS_COLD:-336}
      - REFRESH_MAX_SEGMENTS_PER_CYCLE=${REFRESH_MAX_SEGMENTS_PER_CYCLE:-50}
      - REFRESH_WEIGHT_VOLATILITY=${REFRESH_WEIGHT_VOLATILITY:-0.75}
      - REFRESH_WEIGHT_VOLUME=${REFRESH_WEIGHT_VOLUME:-0.25}
      - REFRESH_HOT_SCORE_THRESHOLD=${REFRESH_HOT_SCORE_THRESHOLD:-0.70}
      - REFRESH_WARM_SCORE_THRESHOLD=${REFRESH_WARM_SCORE_THRESHOLD:-0.35}
      - REFRESH_HIGH_VOLUME_THRESHOLD=${REFRESH_HIGH_VOLUME_THRESHOLD:-1500}
      - REFRESH_VOLATILITY_LOOKBACK_SNAPSHOTS=${REFRESH_VOLATILITY_LOOKBACK_SNAPSHOTS:-5}
      - REFRESH_VOLATILITY_CAP=${REFRESH_VOLATILITY_CAP:-0.10}
      - REFRESH_MIN_AGE_HOURS=${REFRESH_MIN_AGE_HOURS:-12}
    volumes:
      - /srv/data/reval_mi/app/data:/app/data:z
      - /srv/data/reval_mi/app/outputs:/app/outputs:z
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reval
      POSTGRES_PASSWORD: reval
      POSTGRES_DB: reval_mi
    volumes:
      - /srv/data/reval_mi/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reval -d reval_mi"]
      interval: 5s
      timeout: 5s
      retries: 10
